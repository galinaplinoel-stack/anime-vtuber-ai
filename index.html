<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura VTuber AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Character Side -->
        <div class="character-side">
            <div class="char-container">
                <img src="character.jpg" alt="Sakura" class="char-img" id="charImg">
                <div class="char-glow" id="charGlow"></div>
                <div class="waves" id="waves">
                    <span></span><span></span><span></span>
                </div>
            </div>
            <div class="char-info">
                <h1>Sakura</h1>
                <p class="status"><span class="dot"></span> Online</p>
            </div>
            <div class="voice-bar">
                <button id="voiceToggle" class="vbtn">🔊</button>
                <select id="voiceSelect">
                    <option value="Mia">🎀 Mia (Cute)</option>
                    <option value="Chloe" selected>💕 Chloe (Sweet)</option>
                    <option value="冰糖">🍬 Bing Tang</option>
                    <option value="茉莉">🌸 Jasmine</option>
                    <option value="Milo">⚡ Milo</option>
                    <option value="Dean">😎 Dean</option>
                </select>
            </div>
        </div>

        <!-- Chat Side -->
        <div class="chat-side">
            <div class="chat-top">
                <span>💬</span>
                <h2>Chat with Sakura</h2>
                <button id="clearBtn" class="clear-btn">🗑️</button>
            </div>

            <div class="messages" id="chatMessages">
                <div class="msg bot">
                    <div class="avatar">🌸</div>
                    <div class="bubble">Konnichiwa~! 🌸 I'm Sakura, your VTuber companion! Let's chat together ne~ ✨</div>
                </div>
            </div>

            <div class="quick-bar">
                <button data-msg="Tell me about yourself">👋 Intro</button>
                <button data-msg="What can you do?">✨ Skills</button>
                <button data-msg="Tell me a joke">😄 Joke</button>
                <button data-msg="Let's play a game!">🎮 Games</button>
                <button data-msg="Sing a song for me!">🎵 Sing</button>
            </div>

            <div class="input-bar">
                <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#fff" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
